name: build

# Reproducibility smoke test. Addresses the review note under the
# Reproducibility dimension: "Missing: reproducibility smoke test in CI".
#
# On every push to main and every pull request, this workflow performs
# a cold checkout, installs the pinned Python dependencies, fetches all
# upstream sources (SHA256-verified against manifest.json), runs the
# full build pipeline, validates every output against its schema, runs
# the test suite, and prints the stats report.
#
# If any of these steps fails, the pipeline is not reproducible from a
# clean clone and the build is marked as failing.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      with_names:
        description: "Include JMnedict names build (large, gitignored)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Reproducible build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: build/requirements.txt

      - name: Install just
        uses: extractions/setup-just@v2
        with:
          just-version: "1.35.0"

      - name: Install pipeline dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r build/requirements.txt

      - name: Cache upstream sources
        uses: actions/cache@v4
        with:
          path: sources
          key: sources-${{ hashFiles('manifest.json') }}
          restore-keys: |
            sources-

      - name: Fetch upstream sources (SHA256-verified)
        run: just fetch

      - name: Run the full build pipeline
        run: |
          if [ "${{ inputs.with_names }}" = "true" ]; then
            just build-names
          else
            just build
          fi

      - name: Validate every output against its schema
        run: just validate

      - name: Lint Python code
        run: just lint

      - name: Run the test suite with coverage
        run: just test-cov

      - name: Print stats report
        run: just stats

      - name: Byte-reproducibility check (build twice, compare hashes)
        timeout-minutes: 10
        # Principle 1 of docs/architecture.md: every byte of built data
        # must be reproducible. This step runs the pipeline a second
        # time and asserts that data/ is byte-identical between the
        # two runs. It catches non-deterministic iteration order,
        # time-dependent output (same-day so dates match), and any
        # silent mutation the first build did beyond its declared
        # outputs.
        #
        # The check hashes data/ contents before and after the second
        # build rather than using `git diff` so it is robust against
        # the committed state of data/ — it directly compares the
        # first build's output against the second build's output.
        run: |
          # Hash data/ after the first build (already done above).
          find data -type f \( -name '*.json' -o -name '*.svg' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > /tmp/data-hashes-first.txt
          echo "First build: $(wc -l </tmp/data-hashes-first.txt) files hashed"

          # Run the pipeline a second time (transforms only; no need to
          # re-validate or re-stats — we care about transform output).
          .venv/bin/python -m build.pipeline > /tmp/second-build.log 2>&1 || {
            cat /tmp/second-build.log
            echo "::error::Second build failed. This is a stronger signal than the first build failing (something non-idempotent). Investigate."
            exit 1
          }

          find data -type f \( -name '*.json' -o -name '*.svg' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > /tmp/data-hashes-second.txt
          echo "Second build: $(wc -l </tmp/data-hashes-second.txt) files hashed"

          if ! diff -q /tmp/data-hashes-first.txt /tmp/data-hashes-second.txt >/dev/null; then
            echo "::error::Byte-reproducibility violated: two consecutive pipeline runs produced different data/ output. Diverging file hashes:"
            diff /tmp/data-hashes-first.txt /tmp/data-hashes-second.txt | head -50
            exit 1
          fi
          echo "::notice::Byte-reproducibility verified: two consecutive pipeline runs produced byte-identical data/."

      - name: Summarize reproducibility check
        run: |
          echo "::notice::Reproducible build completed: fetch (SHA256-verified) → build → validate → tests → stats → build-twice-diff. Counts: see 'Print stats report' step above."

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: build/requirements.txt

      - name: Install just
        uses: extractions/setup-just@v2
        with:
          just-version: "1.35.0"

      - name: Install pipeline dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r build/requirements.txt

      - name: Cache upstream sources
        uses: actions/cache@v4
        with:
          path: sources
          key: sources-${{ hashFiles('manifest.json') }}
          restore-keys: |
            sources-

      - name: Fetch and build
        run: |
          just fetch
          just build

      - name: Generate export artifacts
        run: |
          just export-sqlite
          just export-yomitan

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Extract content between the first and second ## [N.N.N] headers
          awk '/^## \[/{if(found) exit; found=1; next} found' \
            CHANGELOG.md > /tmp/release-notes.md
          echo "Extracted $(wc -l < /tmp/release-notes.md) lines of release notes"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            dist/japanese-language-data.sqlite
            dist/japanese-language-data.zip
