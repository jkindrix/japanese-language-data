[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["build"]
omit = ["build/__pycache__/*"]

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 50
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
]
